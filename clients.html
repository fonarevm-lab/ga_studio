<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GA Studio — Клиенты</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Source+Code+Pro:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
:root{--bg:#f4f5f7;--bg-card:#fff;--bg-sidebar:#0c1220;--bg-sidebar-hover:rgba(255,255,255,.06);--bg-sidebar-active:rgba(110,198,68,.12);--bg-glass:rgba(255,255,255,.72);--ink:#0f172a;--ink-secondary:#475569;--ink-muted:#94a3b8;--ink-inverse:#f8fafc;--ink-sidebar:rgba(255,255,255,.6);--ink-sidebar-active:#6ec644;--green:#3aab64;--green-soft:rgba(58,171,100,.1);--green-border:rgba(58,171,100,.25);--purple:#7c3aed;--purple-soft:rgba(124,58,237,.08);--amber:#d97706;--amber-soft:rgba(217,119,6,.1);--rose:#e11d48;--rose-soft:rgba(225,29,72,.08);--blue:#2563eb;--blue-soft:rgba(37,99,235,.08);--border:#e2e8f0;--border-strong:#cbd5e1;--shadow-xs:0 1px 2px rgba(0,0,0,.04);--shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 12px rgba(0,0,0,.07);--shadow-lg:0 12px 40px rgba(0,0,0,.1);--r:6px;--r-md:10px;--r-lg:14px;--r-full:9999px;--sp-3:12px;--sp-4:16px;--sp-5:20px;--sp-6:24px;--sp-8:32px;--font:'Source Sans 3',system-ui,sans-serif;--mono:'Source Code Pro',ui-monospace,monospace;--sidebar-w:272px;--header-h:60px;--ease:cubic-bezier(.4,0,.2,1)}
@media(prefers-color-scheme:dark){:root{--bg:#0b0f1a;--bg-card:#141b2d;--bg-glass:rgba(20,27,45,.8);--ink:#e2e8f0;--ink-secondary:#94a3b8;--ink-muted:#64748b;--border:#1e293b;--border-strong:#334155}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{font-size:16px;-webkit-font-smoothing:antialiased}body{font-family:var(--font);font-size:14px;line-height:1.55;color:var(--ink);background:var(--bg)}button{font:inherit;color:inherit}a{color:inherit;text-decoration:none}svg{display:block}
.shell{display:grid;grid-template-columns:var(--sidebar-w) 1fr;grid-template-rows:var(--header-h) 1fr;min-height:100vh}
.sidebar{position:sticky;top:0;height:100vh;background:var(--bg-sidebar);display:flex;flex-direction:column;z-index:100;border-right:1px solid rgba(255,255,255,.06)}
.sidebar-brand{padding:20px 22px;display:flex;align-items:center;gap:14px;border-bottom:1px solid rgba(255,255,255,.06)}.sidebar-brand-icon{width:40px;height:40px;border-radius:var(--r-md);background:linear-gradient(135deg,var(--green),#226e3f);display:flex;align-items:center;justify-content:center;flex-shrink:0}.sidebar-brand-text{color:var(--ink-inverse);font-size:17px;font-weight:600}.sidebar-brand-sub{font-size:11px;color:var(--ink-sidebar)}
.sidebar-nav{flex:1;overflow-y:auto;padding:16px 12px}.nav-group{margin-bottom:24px}.nav-group-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.3);padding:0 12px;margin-bottom:8px}.nav-link{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--r);color:var(--ink-sidebar);font-size:13.5px;transition:all .15s var(--ease);position:relative;margin-bottom:2px}.nav-link:hover{background:var(--bg-sidebar-hover);color:var(--ink-inverse)}.nav-link.active{background:var(--bg-sidebar-active);color:var(--ink-sidebar-active);font-weight:500}.nav-link.active::before{content:'';position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:3px;height:22px;border-radius:0 3px 3px 0;background:var(--green)}.nav-link svg{width:19px;height:19px;stroke-width:1.8;fill:none;stroke:currentColor;flex-shrink:0}
.sidebar-profile{padding:16px;border-top:1px solid rgba(255,255,255,.06)}.profile-card{display:flex;align-items:center;gap:12px;padding:12px;border-radius:var(--r-md);background:rgba(58,171,100,.08);border:1px solid rgba(58,171,100,.15)}.profile-avatar{width:38px;height:38px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:linear-gradient(135deg,var(--green),#226e3f)}.profile-avatar svg{width:28px;height:28px}.profile-name{font-size:13px;font-weight:500;color:var(--ink-inverse)}.profile-role{font-size:11px;color:var(--green);font-weight:500;margin-top:1px}
.header{grid-column:2;height:var(--header-h);background:var(--bg-glass);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 var(--sp-8);position:sticky;top:0;z-index:50}
.header-title{font-size:16px;font-weight:500;display:flex;align-items:center;gap:var(--sp-3)}.header-title svg{width:18px;height:18px;stroke-width:1.8;fill:none;stroke:var(--green)}
.main{grid-column:2;padding:var(--sp-8);overflow-y:auto;max-height:calc(100vh - var(--header-h))}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r-md);font-size:13px;font-weight:500;border:1.5px solid var(--border);background:var(--bg-card);cursor:pointer;transition:all .15s var(--ease);margin-bottom:var(--sp-6);color:var(--ink-secondary)}.back-btn:hover{border-color:var(--green-border);background:var(--green-soft);color:var(--green)}.back-btn svg{width:14px;height:14px;stroke-width:2;fill:none;stroke:currentColor}
.list-table{width:100%;border-collapse:collapse;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-xs)}.list-table th{text-align:left;padding:12px 16px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-muted);background:var(--bg);border-bottom:1px solid var(--border)}.list-table td{padding:14px 16px;border-bottom:1px solid var(--border);font-size:13px}.list-table tr:last-child td{border-bottom:none}.list-table tr{transition:background .12s;cursor:pointer}.list-table tr:hover td{background:rgba(58,171,100,.05)}
.tag{display:inline-flex;padding:3px 8px;border-radius:var(--r);font-size:11px;font-weight:600}.tag.t-green{background:var(--green-soft);color:var(--green)}.tag.t-amber{background:var(--amber-soft);color:var(--amber)}.tag.t-blue{background:var(--blue-soft);color:var(--blue)}.tag.t-purple{background:var(--purple-soft);color:var(--purple)}.tag.t-rose{background:rgba(225,29,72,.08);color:#e11d48}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
.page-title{font-size:22px;font-weight:300;letter-spacing:-.5px;margin-bottom:var(--sp-3)}.page-title b{font-weight:500;color:var(--green)}.page-sub{font-size:13px;color:var(--ink-secondary);margin-bottom:var(--sp-6)}

/* Client card modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);z-index:300;display:none;align-items:center;justify-content:center;animation:fadeIn .2s var(--ease)}.modal-overlay.open{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:400px;max-width:92vw;animation:slideUp .25s var(--ease);overflow:hidden}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-head{padding:var(--sp-5);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:var(--sp-4);position:relative}.modal-head::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--green),#8ad9ac)}
.modal-avatar{width:48px;height:48px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0;background:linear-gradient(135deg,var(--green),#226e3f)}
.modal-info{flex:1;min-width:0}.modal-name{font-size:17px;font-weight:600;letter-spacing:-.2px}.modal-phone{font-size:12.5px;color:var(--ink-muted);margin-top:1px;font-family:var(--mono)}
.modal-close{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-muted);transition:all .15s}.modal-close:hover{background:var(--rose-soft);color:var(--rose)}
.modal-body{padding:var(--sp-5)}
.modal-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}.modal-row:last-child{border-bottom:none}.modal-label{font-size:12px;color:var(--ink-muted);font-weight:500}.modal-val{font-size:13px;font-weight:500;text-align:right}
.modal-tags{display:flex;flex-wrap:wrap;gap:var(--sp-3);margin-top:var(--sp-3)}

@media(max-width:1080px){.hamburger{display:flex;width:40px;height:40px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg-card);cursor:pointer;align-items:center;justify-content:center;color:var(--ink-secondary)}.sidebar{position:fixed;left:0;top:0;transform:translateX(-100%);z-index:200}.main{grid-column:1/-1;padding:var(--sp-5) var(--sp-4)}.header{grid-column:1/-1}}
  </style>

<script>
const clients = DataProvider.getClients();
const services = DataProvider.getServices();
const appts = DataProvider.getAppointments();

document.getElementById('count').textContent = clients.length + ' чел.';
document.getElementById('tbody').innerHTML = clients.map(c => {
  const tags = (c.tags || []).map(t => {
    const cls = t === 'vip' ? 't-purple' : t === 'аллергия' ? 't-rose' : t === 'эко' ? 't-green' : 't-blue';
    return '<span class="tag ' + cls + '">' + t + '</span>';
  }).join(' ');
  const allergyNote = (c.allergies || []).length ? '⚠ ' + c.allergies.join(', ') : '';
  return '<tr onclick="openClient(' + c.id + ')"><td><strong>' + c.name + '</strong></td><td class="mono">' + c.phone + '</td><td>' + (allergyNote || c.notes || '—') + '</td><td>' + tags + '</td></tr>';
}).join('');

function openClient(id) {
  const c = DataProvider.getClientById(id);
  if (!c) return;
  const clientAppts = appts.filter(a => a.clientId === id);
  const tags = (c.tags || []).map(t => {
    const cls = t === 'vip' ? 't-purple' : t === 'аллергия' ? 't-rose' : t === 'эко' ? 't-green' : 't-blue';
    return '<span class="tag ' + cls + '">' + t + '</span>';
  }).join(' ');
  document.getElementById('clientCard').innerHTML =
    '<div class="modal-head"><div class="modal-avatar">' + c.name.split(' ').map(n=>n[0]).join('') + '</div><div class="modal-info"><div class="modal-name">' + c.name + '</div><div class="modal-phone">' + c.phone + '</div></div><button class="modal-close" onclick="closeCard()"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>' +
    '<div class="modal-body">' +
    '<div class="modal-row"><span class="modal-label">Заметки</span><span class="modal-val">' + (c.notes || '—') + '</span></div>' +
    '<div class="modal-row"><span class="modal-label">Аллергии</span><span class="modal-val" style="color:' + ((c.allergies||[]).length ? 'var(--rose)' : 'var(--ink-muted)') + '">' + ((c.allergies||[]).length ? c.allergies.join(', ') : 'Нет') + '</span></div>' +
    '<div class="modal-row"><span class="modal-label">Записей</span><span class="modal-val mono">' + clientAppts.length + '</span></div>' +
    (tags ? '<div class="modal-tags">' + tags + '</div>' : '') +
    '</div>';
  document.getElementById('clientOverlay').classList.add('open');
}

function closeCard() {
  document.getElementById('clientOverlay').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCard(); });
document.addEventListener('click',e=>{const s=document.getElementById('sidebar'),b=document.querySelector('hamburger');if(s&&s.classList.contains('open')&&!s.contains(e.target)&&!b.contains(e.target))s.classList.remove('open')});
</script>
