<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GA Studio — Мастер</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Source+Code+Pro:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
:root{--bg:#f4f5f7;--bg-card:#fff;--bg-sidebar:#0c1220;--bg-sidebar-hover:rgba(255,255,255,.06);--bg-sidebar-active:rgba(110,198,68,.12);--bg-glass:rgba(255,255,255,.72);--ink:#0f172a;--ink-secondary:#475569;--ink-muted:#94a3b8;--ink-inverse:#f8fafc;--ink-sidebar:rgba(255,255,255,.6);--ink-sidebar-active:#6ec644;--g50:#f0faf4;--g100:#dcf5e6;--g300:#8ad9ac;--g500:#3aab64;--g600:#2a8a4f;--g700:#226e3f;--g800:#1e5834;--green:#3aab64;--green-soft:rgba(58,171,100,.1);--green-border:rgba(58,171,100,.25);--purple:#7c3aed;--purple-soft:rgba(124,58,237,.08);--amber:#d97706;--amber-soft:rgba(217,119,6,.1);--rose:#e11d48;--rose-soft:rgba(225,29,72,.08);--blue:#2563eb;--blue-soft:rgba(37,99,235,.08);--gray:#64748b;--gray-soft:rgba(100,116,139,.08);--border:#e2e8f0;--border-strong:#cbd5e1;--shadow-xs:0 1px 2px rgba(0,0,0,.04);--shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 12px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.04);--shadow-lg:0 12px 40px rgba(0,0,0,.1);--r-xs:4px;--r:6px;--r-md:10px;--r-lg:14px;--r-full:9999px;--sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:20px;--sp-6:24px;--sp-8:32px;--font:'Source Sans 3',system-ui,sans-serif;--mono:'Source Code Pro',ui-monospace,monospace;--sidebar-w:272px;--header-h:60px;--ease:cubic-bezier(.4,0,.2,1)}
@media(prefers-color-scheme:dark){:root{--bg:#0b0f1a;--bg-card:#141b2d;--bg-glass:rgba(20,27,45,.8);--ink:#e2e8f0;--ink-secondary:#94a3b8;--ink-muted:#64748b;--border:#1e293b;--border-strong:#334155;--shadow-xs:0 1px 2px rgba(0,0,0,.2);--shadow-sm:0 1px 3px rgba(0,0,0,.3);--shadow-md:0 4px 12px rgba(0,0,0,.35);--shadow-lg:0 12px 40px rgba(0,0,0,.5)}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{font-size:16px;-webkit-font-smoothing:antialiased;scroll-behavior:smooth}body{font-family:var(--font);font-size:14px;line-height:1.55;color:var(--ink);background:var(--bg);overflow-x:hidden}button,input,textarea{font:inherit;color:inherit}a{color:inherit;text-decoration:none}img,svg{display:block}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}::selection{background:var(--green-soft);color:var(--g800)}

.shell{display:grid;grid-template-columns:var(--sidebar-w) 1fr;grid-template-rows:var(--header-h) 1fr;min-height:100vh}
.sidebar{position:sticky;top:0;height:100vh;background:var(--bg-sidebar);display:flex;flex-direction:column;z-index:100;border-right:1px solid rgba(255,255,255,.06);transition:transform .25s var(--ease)}.sidebar-brand{padding:20px 22px;display:flex;align-items:center;gap:14px;border-bottom:1px solid rgba(255,255,255,.06)}.sidebar-brand-icon{width:40px;height:40px;border-radius:var(--r-md);background:linear-gradient(135deg,var(--green),var(--g700));display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 20px rgba(58,171,100,.3)}.sidebar-brand-text{color:var(--ink-inverse);font-size:17px;font-weight:600;letter-spacing:-.3px}.sidebar-brand-sub{font-size:11px;color:var(--ink-sidebar);margin-top:1px}
.sidebar-nav{flex:1;overflow-y:auto;padding:16px 12px}.nav-group{margin-bottom:24px}.nav-group-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.3);padding:0 12px;margin-bottom:8px}.nav-link{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--r);color:var(--ink-sidebar);font-size:13.5px;transition:all .15s var(--ease);position:relative;margin-bottom:2px}.nav-link:hover{background:var(--bg-sidebar-hover);color:var(--ink-inverse)}.nav-link.active{background:var(--bg-sidebar-active);color:var(--ink-sidebar-active);font-weight:500}.nav-link.active::before{content:'';position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:3px;height:22px;border-radius:0 3px 3px 0;background:var(--green)}.nav-link svg{width:19px;height:19px;stroke-width:1.8;fill:none;stroke:currentColor;flex-shrink:0}.nav-link .badge{margin-left:auto;font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:var(--r-full);background:var(--green-soft);color:var(--green)}
.sidebar-profile{padding:16px;border-top:1px solid rgba(255,255,255,.06)}.profile-card{display:flex;align-items:center;gap:12px;padding:12px;border-radius:var(--r-md);background:rgba(58,171,100,.08);border:1px solid rgba(58,171,100,.15)}.profile-avatar{width:38px;height:38px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:linear-gradient(135deg,var(--green),var(--g700))}.profile-avatar svg{width:28px;height:28px}.profile-name{font-size:13px;font-weight:500;color:var(--ink-inverse)}.profile-role{font-size:11px;color:var(--green);font-weight:500;margin-top:1px}

.header{grid-column:2;height:var(--header-h);background:var(--bg-glass);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 var(--sp-8);position:sticky;top:0;z-index:50}.header-left{display:flex;align-items:center;gap:var(--sp-4)}.hamburger{display:none;width:40px;height:40px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg-card);cursor:pointer;align-items:center;justify-content:center;color:var(--ink-secondary)}.hamburger:hover{background:var(--green-soft);color:var(--green)}.header-right{display:flex;align-items:center;gap:var(--sp-3)}.hdr-btn{width:40px;height:40px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg-card);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-secondary);transition:all .15s var(--ease);position:relative}.hdr-btn:hover{background:var(--green-soft);color:var(--green)}.hdr-btn svg{width:19px;height:19px;stroke-width:1.8;fill:none;stroke:currentColor}.hdr-btn .pip{position:absolute;top:8px;right:8px;width:7px;height:7px;background:var(--rose);border-radius:50%;border:2px solid var(--bg-card)}.hdr-divider{width:1px;height:28px;background:var(--border);margin:0 var(--sp-1)}
.main{grid-column:2;padding:var(--sp-6);overflow-y:auto;max-height:calc(100vh - var(--header-h))}

.greeting{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-5);flex-wrap:wrap;gap:var(--sp-3)}.greeting-text{font-size:22px;font-weight:300;letter-spacing:-.5px}.greeting-text b{font-weight:500;color:var(--green)}
.status-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--r-full);font-size:12px;font-weight:600}.status-pill .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}.s-green{background:var(--green-soft);color:var(--green)}.s-green .dot{background:var(--green);box-shadow:0 0 6px var(--green)}.s-amber{background:var(--amber-soft);color:var(--amber)}.s-amber .dot{background:var(--amber)}.s-red{background:var(--rose-soft);color:var(--rose)}.s-red .dot{background:var(--rose)}.s-blue{background:var(--blue-soft);color:var(--blue)}.s-blue .dot{background:var(--blue)}

/* VIEW TOGGLE */
.view-toggle{display:flex;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;box-shadow:var(--shadow-xs)}
.view-btn{padding:8px 18px;font-size:13px;font-weight:500;border:none;cursor:pointer;transition:all .15s var(--ease);background:transparent;color:var(--ink-muted);display:flex;align-items:center;gap:6px}.view-btn svg{width:15px;height:15px;stroke-width:2;fill:none;stroke:currentColor}.view-btn.active{background:var(--green-soft);color:var(--green);font-weight:600}.view-btn:hover:not(.active){background:var(--bg)}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp-3);margin-bottom:var(--sp-5)}.s-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);padding:var(--sp-4);box-shadow:var(--shadow-xs);transition:all .2s var(--ease);position:relative;overflow:hidden}.s-card:hover{box-shadow:var(--shadow-sm);transform:translateY(-2px)}.s-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-2)}.s-icon{width:32px;height:32px;border-radius:var(--r);display:flex;align-items:center;justify-content:center}.s-icon svg{width:16px;height:16px;stroke-width:1.8;fill:none;stroke:currentColor}.s-icon.i-purple{background:var(--purple-soft);color:var(--purple)}.s-icon.i-green{background:var(--green-soft);color:var(--green)}.s-icon.i-amber{background:var(--amber-soft);color:var(--amber)}.s-value{font-size:26px;font-weight:300;line-height:1.1;letter-spacing:-.5px;font-feature-settings:"tnum"}.s-label{font-size:12px;color:var(--ink-secondary);margin-top:2px}

.now-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--sp-5);margin-bottom:var(--sp-5);box-shadow:var(--shadow-sm);position:relative;overflow:hidden;display:grid;grid-template-columns:1fr auto;gap:var(--sp-5);align-items:center}.now-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--green),var(--g300))}.now-card.problems::before{background:linear-gradient(90deg,var(--rose),#fb7185)}.now-card.waiting::before{background:linear-gradient(90deg,var(--amber),#fbbf24)}.now-card.idle::before{background:linear-gradient(90deg,var(--border),var(--border-strong))}.now-left{display:flex;flex-direction:column;gap:var(--sp-2)}.now-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--green)}.now-name{font-size:22px;font-weight:500;letter-spacing:-.4px}.now-detail{font-size:13px;color:var(--ink-secondary);display:flex;align-items:center;gap:var(--sp-2);flex-wrap:wrap}.now-detail .tag{padding:3px 8px;font-size:11px;border-radius:var(--r)}.now-right{display:flex;flex-direction:column;align-items:center;gap:var(--sp-2)}.now-timer{font-size:42px;font-weight:300;font-family:var(--mono);letter-spacing:-.5px;line-height:1;font-feature-settings:"tnum"}.now-timer-label{font-size:11px;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.06em}.now-actions{display:flex;gap:var(--sp-2);grid-column:1/-1;flex-wrap:wrap}.now-btn{display:inline-flex;align-items:center;gap:var(--sp-2);padding:8px 18px;border-radius:var(--r-md);font-size:13px;font-weight:500;border:none;cursor:pointer;transition:all .15s var(--ease)}.now-btn svg{width:15px;height:15px;stroke-width:2;fill:none;stroke:currentColor}.now-btn.primary{background:var(--green);color:#fff;box-shadow:var(--shadow-sm)}.now-btn.primary:hover{background:var(--g600)}.now-btn.ghost{background:var(--bg);color:var(--ink-secondary);border:1.5px solid var(--border)}.now-btn.ghost:hover{border-color:var(--green-border);background:var(--green-soft);color:var(--green)}.now-btn.danger{background:var(--rose-soft);color:var(--rose);border:1.5px solid rgba(225,29,72,.15)}.now-btn.danger:hover{background:var(--rose);color:#fff}.now-problems{background:var(--rose-soft);border:1px solid rgba(225,29,72,.15);border-radius:var(--r);padding:8px 12px;display:flex;align-items:center;gap:var(--sp-2);font-size:12px;color:var(--rose);grid-column:1/-1}.now-problems svg{width:14px;height:14px;stroke-width:2;fill:none;stroke:currentColor;flex-shrink:0}

.grid-main{display:grid;grid-template-columns:1fr 340px;gap:var(--sp-5);margin-bottom:var(--sp-5)}.grid-bottom{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-5)}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-xs);overflow:hidden;transition:box-shadow .2s}.card:hover{box-shadow:var(--shadow-sm)}.card-head{padding:var(--sp-4) var(--sp-5);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:var(--sp-3)}.card-title{font-size:15px;font-weight:500;letter-spacing:-.2px;display:flex;align-items:center;gap:var(--sp-2)}.card-title .icon{width:26px;height:26px;border-radius:var(--r);display:inline-flex;align-items:center;justify-content:center}.card-title .icon svg{width:14px;height:14px;stroke-width:2;fill:none;stroke:currentColor}.card-title .icon.g{background:var(--green-soft);color:var(--green)}.card-link{font-size:12px;color:var(--green);font-weight:500;display:inline-flex;align-items:center;gap:4px;transition:opacity .15s}.card-link:hover{opacity:.65}.card-body{padding:var(--sp-4) var(--sp-5)}

.tl-item{display:grid;grid-template-columns:52px 1fr auto;gap:var(--sp-3);align-items:center;padding:10px var(--sp-3);border-radius:var(--r-md);border:1px solid var(--border);margin-bottom:var(--sp-2);transition:all .15s var(--ease);background:var(--bg)}.tl-item:hover{border-color:var(--border-strong);box-shadow:var(--shadow-xs);transform:translateX(2px)}.tl-item.st-pending{border-left:3px solid var(--amber)}.tl-item.st-confirmed{border-left:3px solid var(--blue)}.tl-item.st-current{border-left:3px solid var(--green);background:var(--g50);box-shadow:0 0 0 2px var(--green-soft)}.tl-item.st-done{opacity:.5;border-left:3px solid var(--purple)}.tl-item.st-rescheduled{opacity:.45;border-left:3px solid var(--gray);border-style:dashed}.tl-item.st-cancelled{opacity:.35;border-left:3px solid var(--rose);text-decoration:line-through}
.tl-time{font-family:var(--mono);font-size:12px;font-weight:600}.tl-client{font-weight:500;font-size:13px}.tl-detail{font-size:11.5px;color:var(--ink-muted);margin-top:1px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tl-status{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:var(--r);white-space:nowrap}.tl-status.s-pending{background:var(--amber-soft);color:var(--amber)}.tl-status.s-confirmed{background:var(--blue-soft);color:var(--blue)}.tl-status.s-current{background:var(--green-soft);color:var(--green)}.tl-status.s-done{background:var(--purple-soft);color:var(--purple)}.tl-status.s-rescheduled{background:var(--gray-soft);color:var(--gray)}.tl-status.s-cancelled{background:var(--rose-soft);color:var(--rose)}
.tl-acts{display:flex;gap:4px;margin-top:4px}.tl-act{width:26px;height:26px;border-radius:var(--r-xs);border:1px solid var(--border);background:transparent;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:var(--ink-muted);transition:all .12s}.tl-act:hover{background:var(--green-soft);color:var(--green);border-color:var(--green-border)}.tl-act.danger:hover{background:var(--rose-soft);color:var(--rose);border-color:rgba(225,29,72,.2)}.tl-act svg{width:12px;height:12px;stroke-width:2;fill:none;stroke:currentColor}.tl-timer{font-family:var(--mono);font-size:11px;color:var(--green);font-weight:600;display:flex;align-items:center;gap:4px}.tl-timer::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.tag{display:inline-flex;padding:4px 10px;border-radius:var(--r);font-size:11.5px;font-weight:600}.tag.t-purple{background:var(--purple-soft);color:var(--purple)}.tag.t-green{background:var(--green-soft);color:var(--green)}.tag.t-amber{background:var(--amber-soft);color:var(--amber)}.tag.t-rose{background:var(--rose-soft);color:var(--rose)}.tag.t-blue{background:var(--blue-soft);color:var(--blue)}

/* CALENDAR */
.cal{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-xs);overflow:hidden;margin-bottom:var(--sp-5)}.cal-head{padding:var(--sp-4) var(--sp-5);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}.cal-title{font-size:16px;font-weight:500}.cal-nav{display:flex;gap:var(--sp-2)}.cal-nav button{width:32px;height:32px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg-card);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-secondary);transition:all .15s}.cal-nav button:hover{background:var(--green-soft);color:var(--green);border-color:var(--green-border)}.cal-nav button svg{width:14px;height:14px;stroke-width:2;fill:none;stroke:currentColor}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:var(--sp-3)}.cal-dow{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-muted);text-align:center;padding:var(--sp-2) 0}.cal-day{height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:var(--r);cursor:pointer;transition:all .12s;font-size:13px;color:var(--ink);position:relative}.cal-day:hover{background:var(--green-soft)}.cal-day.today{font-weight:700;color:var(--green)}.cal-day.today::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);position:absolute;bottom:4px}.cal-day.selected{background:var(--green);color:#fff;border-radius:var(--r)}.cal-day.selected::after{background:#fff}.cal-day.other{color:var(--ink-muted);opacity:.4}.cal-day.has-appts::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--amber);position:absolute;top:6px;right:6px}.cal-day.has-appts.done::before{background:var(--purple)}
.cal-body{padding:var(--sp-4) var(--sp-5);border-top:1px solid var(--border)}.cal-day-label{font-size:14px;font-weight:500;margin-bottom:var(--sp-3);display:flex;align-items:center;justify-content:space-between}.cal-day-label span{font-size:12px;color:var(--ink-muted);font-family:var(--mono)}
.cal-appt{display:flex;align-items:center;gap:var(--sp-3);padding:8px var(--sp-3);border-radius:var(--r-md);border:1px solid var(--border);margin-bottom:var(--sp-2);transition:all .12s;cursor:pointer}.cal-appt:hover{border-color:var(--border-strong);box-shadow:var(--shadow-xs)}.cal-appt-time{font-family:var(--mono);font-size:12px;font-weight:600;min-width:42px}.cal-appt-info{flex:1;min-width:0}.cal-appt-name{font-size:13px;font-weight:500}.cal-appt-svc{font-size:11px;color:var(--ink-muted)}.cal-appt-st{font-size:10px;font-weight:600;padding:2px 7px;border-radius:var(--r)}

/* SNACKBAR */
.snackbar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--ink-inverse);padding:12px 20px;border-radius:var(--r-md);display:flex;align-items:center;gap:var(--sp-3);box-shadow:var(--shadow-lg);z-index:400;font-size:13px;font-weight:500;animation:slideUp .25s var(--ease);max-width:400px;width:auto}.snackbar.hidden{display:none}.snackbar-msg{flex:1}.snackbar-undo{background:rgba(255,255,255,.15);color:var(--ink-inverse);border:none;padding:6px 14px;border-radius:var(--r);cursor:pointer;font-size:12px;font-weight:600;transition:background .15s;white-space:nowrap}.snackbar-undo:hover{background:rgba(255,255,255,.25)}.snackbar-timer{font-family:var(--mono);font-size:11px;opacity:.6}

/* JOURNAL */
.journal{display:flex;flex-direction:column;gap:var(--sp-2)}.journal-item{display:flex;align-items:flex-start;gap:var(--sp-2);padding:8px var(--sp-3);border-radius:var(--r-md);border:1px solid var(--border);transition:all .12s}.journal-item:hover{border-color:var(--border-strong)}.journal-time{font-family:var(--mono);font-size:10.5px;color:var(--ink-muted);min-width:36px;padding-top:1px}.journal-body{flex:1;min-width:0}.journal-text{font-size:12px;color:var(--ink);line-height:1.3}.journal-undo{font-size:10.5px;color:var(--green);cursor:pointer;font-weight:500;margin-top:2px;display:inline-flex;align-items:center;gap:3px;border:none;background:none;padding:0}.journal-undo:hover{text-decoration:underline}.journal-undo.used{color:var(--ink-muted);cursor:default;pointer-events:none}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}.anim{animation:fadeUp .4s var(--ease) both}.d1{animation-delay:.04s}.d2{animation-delay:.08s}.d3{animation-delay:.12s}.d4{animation-delay:.16s}

<script>
document.addEventListener('click',e=>{const s=document.getElementById('sidebar'),b=document.querySelector('.hamburger');if(s&&s.classList.contains('open')&&!s.contains(e.target)&&!b.contains(e.target))s.classList.remove('open')});

const NOW=new Date(),DAY=NOW.getDate(),MONTH=NOW.getMonth(),YEAR=NOW.getFullYear();
function mkTime(h,m){return new Date(YEAR,MONTH,DAY,h,m)}
function fmtHM(d){return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')}
function fmtDur(ms){if(ms<0)ms=0;const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);return(h>0?h+'ч ':'')+m+'мин '+s+'сек'}
function fmtDurShort(ms){if(ms<0)ms=0;const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);return(h>0?h+'ч ':'')+m+'мин'}

const STATUS_MAP={pending:{label:'Ожидает',cls:'s-pending'},confirmed:{label:'Подтверждена',cls:'s-confirmed'},current:{label:'В работе',cls:'s-current'},done:{label:'Завершена',cls:'done'},rescheduled:{label:'Перенесена',cls:'s-rescheduled'},cancelled:{label:'Отменена',cls:'s-cancelled'}};

// ════════════════ DATA (из DataProvider) ════════════════
// Данные загружаются из data/*.js через DataProvider
// Интерфейс обращается ТОЛЬКО к DataProvider
let appts=window.DATA_appointments_generator(mkTime);
DataProvider.setAppointments(appts);

// Хелперы — теперь через DataProvider
function getClientName(a){return DataProvider.getClientName(a)}
function getServiceName(a){return DataProvider.getServiceName(a)}
function getServicePrice(a){return DataProvider.getServicePrice(a)}
function getServiceDuration(a){return DataProvider.getServiceDuration(a)}

// features — теперь через DataProvider
const features=DataProvider.getFeatures();

// ════════════════ VIEW MODE ════════════════
let viewMode='today';
let calMonth=NOW.getMonth(), calYear=NOW.getFullYear(), calSelectedDay=null;

function switchView(mode){
  viewMode=mode;
  document.getElementById('todayView').style.display=mode==='today'?'':'none';
  document.getElementById('calendarView').style.display=mode==='calendar'?'':'none';
  document.getElementById('btnToday').classList.toggle('active',mode==='today');
  document.getElementById('btnCal').classList.toggle('active',mode==='calendar');
  if(mode==='calendar')renderCalendar();
}

// ════════════════ JOURNAL + UNDO ════════════════
let journal=[];
let undoStack=[];
let snackbarTimer=null;

function addAction(text,apptId,reverseFn){
  const entry={id:Date.now(),text,apptId,timestamp:new Date(),undone:false,reverseFn};
  journal.unshift(entry);
  if(journal.length>10)journal.pop();
  renderJournal();
  return entry;
}

function showSnackbar(msg,entry){
  const el=document.getElementById('snackbar');
  const msgEl=document.getElementById('snackbarMsg');
  const timerEl=document.getElementById('snackbarTimer');
  const undoBtn=document.getElementById('snackbarUndo');
  clearTimeout(snackbarTimer);
  el.classList.remove('hidden');
  msgEl.textContent='✓ '+msg;
  undoBtn.style.display=entry?'':'none';
  let remaining=10;
  timerEl.textContent=remaining+'с';
  snackbarTimer=setInterval(()=>{
    remaining--;
    timerEl.textContent=remaining+'с';
    if(remaining<=0){clearInterval(snackbarTimer);el.classList.add('hidden');if(entry)entry.undone=false;renderJournal();}
  },1000);
}

function undoAction(){
  if(journal.length===0||journal[0].undone)return;
  const entry=journal[0];
  if(entry.reverseFn)entry.reverseFn();
  entry.undone=true;
  clearTimeout(snackbarTimer);
  document.getElementById('snackbar').classList.add('hidden');
  renderAll();renderJournal();
}

function renderJournal(){
  const el=document.getElementById('journal');
  document.getElementById('journalCount').textContent=journal.length+' действий';
  if(!journal.length){el.innerHTML='<div style="text-align:center;padding:var(--sp-4);color:var(--ink-muted);font-size:12px">Пока нет событий</div>';return;}
  el.innerHTML=journal.map((j,i)=>{
    const t=j.timestamp;
    const timeStr=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
    const canUndo=i===0&&!j.undone;
    return '<div class="journal-item"><div class="journal-time">'+timeStr+'</div><div class="journal-body"><div class="journal-text">'+j.text+'</div>'+(canUndo?'<button class="journal-undo" onclick="undoAction()">↩ Отменить</button>':'<button class="journal-undo used">↩</button>')+'</div></div>';
  }).join('');
}

// ════════════════ ACTIONS (with undo) ════════════════
function confirmAppt(id){
  const a=appts.find(x=>x.id===id);if(!a||a.status!=='pending')return;
  const prev=a.status;
  a.status='confirmed';
  const entry=addAction('<strong>'+getClientName(a)+'</strong> — подтверждена',id,()=>{a.status=prev;});
  showSnackbar('Запись подтверждена',entry);renderAll();
}
function startAppt(id){
  const a=appts.find(x=>x.id===id);if(!a||a.status!=='confirmed')return;
  const prev=a.status,prevStarted=a.startedAt;
  a.status='current';a.startedAt=new Date();
  const entry=addAction('<strong>'+getClientName(a)+'</strong> — начало работы',id,()=>{a.status=prev;a.startedAt=prevStarted;});
  showSnackbar('Запись начата',entry);renderAll();
}
function extendAppt(id){
  const a=appts.find(x=>x.id===id);if(!a||a.status!=='current')return;
  const prev=a.duration;
  a.duration+=15;
  const entry=addAction('<strong>'+getClientName(a)+'</strong> — продлено +15 мин',id,()=>{a.duration=prev;});
  showSnackbar('Продлено на 15 минут',entry);renderAll();
}
function openComplete(id){
  completingId=id;const a=appts.find(x=>x.id===id);if(!a)return;
  const elapsed=a.startedAt?Date.now()-a.startedAt.getTime():0;
  document.getElementById('modalBody').innerHTML=
    '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><span style="font-size:12px;color:var(--ink-muted)">Клиент</span><span style="font-size:13px;font-weight:500">'+getClientName(a)+'</span></div>'+
    '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><span style="font-size:12px;color:var(--ink-muted)">Услуга</span><span style="font-size:13px;font-weight:500">'+getServiceName(a)+'</span></div>'+
    '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><span style="font-size:12px;color:var(--ink-muted)">Начало</span><span style="font-size:13px;font-family:var(--mono)">'+fmtHM(a.startedAt||a.time)+'</span></div>'+
    '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><span style="font-size:12px;color:var(--ink-muted)">Фактическое время</span><span style="font-size:13px;font-family:var(--mono)">'+fmtDurShort(elapsed)+'</span></div>'+
    '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><span style="font-size:12px;color:var(--ink-muted)">Цена</span><span style="font-size:13px;font-family:var(--mono)">₽'+getServicePrice(a).toLocaleString()+'</span></div>'+
    '<div style="margin-top:12px"><label style="display:block;font-size:12px;color:var(--ink-muted);margin-bottom:4px">Комментарий мастера</label><textarea id="completeComment" style="width:100%;height:60px;padding:10px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--bg);font-size:13px;resize:none" placeholder="Например: тон сел ровно…">'+a.comment+'</textarea></div>';
  document.getElementById('completeModal').classList.add('open');
}
function confirmComplete(){
  if(completingId===null)return;
  const a=appts.find(x=>x.id===completingId);if(!a)return;
  const prev=a.status,prevCompleted=a.completedAt,prevComment=a.comment;
  const c=document.getElementById('completeComment');if(c)a.comment=c.value;
  a.status='done';a.completedAt=new Date();
  const entry=addAction('<strong>'+getClientName(a)+'</strong> — завершена, ₽'+getServicePrice(a).toLocaleString(),a.id,()=>{a.status=prev;a.completedAt=prevCompleted;a.comment=prevComment;});
  completingId=null;closeModal();showSnackbar('Запись завершена',entry);renderAll();
}
function rescheduleAppt(id){
  const a=appts.find(x=>x.id===id);if(!a||a.status==='done'||a.status==='cancelled'||a.status==='current')return;
  const prev=a.status;
  a.status='rescheduled';
  const entry=addAction('<strong>'+getClientName(a)+'</strong> — перенесена',id,()=>{a.status=prev;});
  showSnackbar('Запись перенесена',entry);renderAll();
}
function cancelAppt(id){
  const a=appts.find(x=>x.id===id);if(!a||a.status==='done'||a.status==='current')return;
  const prev=a.status;
  a.status='cancelled';
  const entry=addAction('<strong>'+getClientName(a)+'</strong> — отменена',id,()=>{a.status=prev;});
  showSnackbar('Запись отменена',entry);renderAll();
}
let completingId=null;
function closeModal(){document.getElementById('completeModal').classList.remove('open');completingId=null}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

// ════════════════ CALENDAR ════════════════
const MONTH_NAMES=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const DOW=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

function renderCalendar(){
  document.getElementById('calMonthTitle').textContent=MONTH_NAMES[calMonth]+' '+calYear;
  const firstDay=new Date(calYear,calMonth,1);
  const lastDay=new Date(calYear,calMonth+1,0);
  let startDay=(firstDay.getDay()+6)%7;
  const totalDays=lastDay.getDate();
  let html='';
  DOW.forEach(d=>{html+='<div class="cal-dow">'+d+'</div>'});
  for(let i=0;i<startDay;i++)html+='<div class="cal-day other"></div>';
  for(let d=1;d<=totalDays;d++){
    const isToday=d===NOW.getDate()&&calMonth===NOW.getMonth()&&calYear===NOW.getFullYear();
    const isSelected=d===calSelectedDay&&calMonth===selectedMonth&&calYear===selectedYear;
    const hasAppts=d<=NOW.getDate()&&calMonth===NOW.getMonth()&&calYear===NOW.getFullYear();
    const allDone=hasAppts&&appts.every(a=>a.status==='done'||a.status==='cancelled'||a.status==='rescheduled');
    let cls='cal-day';
    if(isToday)cls+=' today';
    if(isSelected)cls+=' selected';
    if(hasAppts)cls+=' has-appts';
    if(allDone&&hasAppts)cls+=' done';
    html+='<div class="'+cls+'" onclick="selectCalDay('+d+')">'+d+'</div>';
  }
  document.getElementById('calGrid').innerHTML=html;
  if(calSelectedDay!==null){
    const body=document.getElementById('calBody');
    body.style.display='';
    const dayAppts=appts.filter(a=>{const dt=a.time;return dt.getDate()===calSelectedDay&&dt.getMonth()===calMonth&&dt.getFullYear()===calYear;});
    const dayNames=['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
    const dateObj=new Date(calYear,calMonth,calSelectedDay);
    let h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><strong style="font-size:14px">'+dayNames[dateObj.getDay()]+', '+calSelectedDay+' '+MONTH_NAMES[calMonth]+'</strong><span style="font-size:12px;color:var(--ink-muted);font-family:var(--mono)">'+dayAppts.length+' записей</span></div>';
    if(!dayAppts.length)h+='<div style="text-align:center;padding:20px;color:var(--ink-muted);font-size:12px">Нет записей на этот день</div>';
    else dayAppts.forEach(a=>{
      const end=new Date(a.time.getTime()+a.duration*60000);
      const s=STATUS_MAP[a.status];
      h+='<div style="display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:10px;border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:all .12s" onmouseover="this.style.borderColor=\'var(--border-strong)\';this.style.boxShadow=\'var(--shadow-xs)\'" onmouseout="this.style.borderColor=\'\';this.style.boxShadow=\'\'" onclick="switchView(\'today\')"><div style="font-family:var(--mono);font-size:12px;font-weight:600;min-width:42px">'+fmtHM(a.time)+'</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500">'+getClientName(a)+'</div><div style="font-size:11px;color:var(--ink-muted)">'+getServiceName(a)+' · '+fmtHM(a.time)+'–'+fmtHM(end)+' · ₽'+getServicePrice(a).toLocaleString()+'</div></div><span class="tl-status '+s.cls+'">'+s.label+'</span></div>';
    });
    body.innerHTML=h;
  } else document.getElementById('calBody').style.display='none';
}

let selectedMonth=MONTH, selectedYear=YEAR;
function selectCalDay(d){
  calSelectedDay=d;selectedMonth=calMonth;selectedYear=calYear;
  renderCalendar();
  const body=document.getElementById('calBody');
  body.style.display='';
  const dayAppts=appts.filter(a=>{const dt=a.time;return dt.getDate()===d&&dt.getMonth()===calMonth&&dt.getFullYear()===calYear;});
  const dayNames=['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
  const dateObj=new Date(calYear,calMonth,d);
  let h='<div class="cal-day-label"><strong>'+dayNames[dateObj.getDay()]+', '+d+' '+MONTH_NAMES[calMonth]+'</strong><span>'+dayAppts.length+' записей</span></div>';
  if(!dayAppts.length)h+='<div style="text-align:center;padding:var(--sp-4);color:var(--ink-muted);font-size:12px">Нет записей на этот день</div>';
  else dayAppts.forEach(a=>{
    const end=new Date(a.time.getTime()+a.duration*60000);
    const s=STATUS_MAP[a.status];
    h+='<div class="cal-appt" onclick="switchView(\'today\')"><div class="cal-appt-time">'+fmtHM(a.time)+'</div><div class="cal-appt-info"><div class="cal-appt-name">'+getClientName(a)+'</div><div class="cal-appt-svc">'+getServiceName(a)+' · '+fmtHM(a.time)+'–'+fmtHM(end)+' · ₽'+getServicePrice(a).toLocaleString()+'</div></div><span class="cal-appt-st tl-status '+s.cls+'">'+s.label+'</span></div>';
  });
  body.innerHTML=h;
}
function calNav(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}calSelectedDay=null;renderCalendar();}

// ════════════════ RENDER ════════════════
function renderStatus(){
  const cur=appts.find(a=>a.status==='current');
  const next=appts.find(a=>a.status==='confirmed'||a.status==='pending');
  let html='';
  if(cur)html='<span class="status-pill s-amber"><span class="dot"></span>В работе — '+cur.client+'</span>';
  else if(next){const diff=next.time-NOW;html=diff<1800000&&diff>0?'<span class="status-pill s-blue"><span class="dot"></span>Следующий через '+fmtDurShort(diff)+'</span>':'<span class="status-pill s-green"><span class="dot"></span>Свободна</span>';}
  else html='<span class="status-pill s-green"><span class="dot"></span>Все записи выполнены ✓</span>';
  document.getElementById('statusRow').innerHTML=html;
}
function renderStats(){const done=appts.filter(a=>a.status==='done').length;const rem=appts.filter(a=>a.status!=='done'&&a.status!=='cancelled'&&a.status!=='rescheduled').length;document.getElementById('statTotal').textContent=appts.length;document.getElementById('statDone').textContent=done;document.getElementById('statRemaining').textContent=rem;}

function renderNowCard(){
  const el=document.getElementById('nowCard');
  const cur=appts.find(a=>a.status==='current');
  if(cur){
    const end=new Date(cur.time.getTime()+cur.duration*60000);const rem=Math.max(0,end-NOW);const el2=cur.startedAt?NOW-cur.startedAt.getTime():0;const pct=Math.min(100,Math.round(el2/(cur.duration*60000)*100));
    const nextAppt=appts.find(a=>a.status==='pending'||a.status==='confirmed');
    let problemHtml='';if(nextAppt){const gap=nextAppt.time-end;if(gap<0)problemHtml='<div class="now-problems"><svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Следующий клиент уже ждёт!</div>';}
    el.className='now-card problems';
    el.innerHTML='<div class="now-left"><div class="now-label">● Сейчас у вас</div><div class="now-name">'+getClientName(cur)+'</div><div class="now-detail"><span class="tag t-amber">'+getServiceName(cur)+'</span> · '+fmtHM(cur.time)+'–'+fmtHM(end)+' · ₽'+getServicePrice(cur).toLocaleString()+'</div><div style="margin-top:8px;height:4px;background:var(--bg);border-radius:2px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,var(--green),var(--g300));border-radius:2px;transition:width 1s linear"></div></div></div><div class="now-right"><div class="now-timer" id="timerValue">'+fmtDur(rem)+'</div><div class="now-timer-label">осталось</div></div>'+problemHtml+'<div class="now-actions"><button class="now-btn primary" onclick="openComplete('+cur.id+')"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Завершить</button><button class="now-btn ghost" onclick="extendAppt('+cur.id+')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Продлить +15 мин</button></div>';
    return;
  }
  // Ищем ближайшую будущую запись (любой статус кроме done/cancelled/rescheduled)
  const future=appts.filter(a=>a.status!=='done'&&a.status!=='cancelled'&&a.status!=='rescheduled').sort((a,b)=>a.time-b.time);
  const next=future.length?future[0]:null;
  if(next){
    const wait=Math.max(0,next.time-NOW);
    const mins=Math.round(wait/60000);
    if(wait>0){
      // Между записями — «Сейчас свободно»
      el.className='now-card idle';
      el.innerHTML='<div class="now-left"><div class="now-label" style="color:var(--ink-muted)">Сейчас свободно</div><div class="now-name">Следующий клиент</div><div class="now-detail"><strong>'+getClientName(next)+'</strong> · '+fmtHM(next.time)+' · '+getServiceName(next)+'</div></div><div class="now-right"><div class="now-timer" id="timerValue">'+mins+' мин</div><div class="now-timer-label">через</div></div>'+(next.status==='confirmed'?'<div class="now-actions"><button class="now-btn primary" onclick="startAppt('+next.id+')"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>Начать запись</button></div>':'<div class="now-actions"><button class="now-btn primary" onclick="confirmAppt('+next.id+')"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Подтвердить</button><button class="now-btn danger" onclick="cancelAppt('+next.id+')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>Отменить</button></div>');
      return;
    }
    // Время пришло — показываем как следующую
    if(next.status==='confirmed'){
      el.className='now-card waiting';el.innerHTML='<div class="now-left"><div class="now-label" style="color:var(--blue)">⏳ Пора начать</div><div class="now-name">'+getClientName(next)+'</div><div class="now-detail"><span class="tag t-blue">'+getServiceName(next)+'</span> · '+fmtHM(next.time)+'</div></div><div class="now-actions"><button class="now-btn primary" onclick="startAppt('+next.id+')"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>Начать запись</button></div>';return;
    }
    el.className='now-card waiting';el.innerHTML='<div class="now-left"><div class="now-label" style="color:var(--amber)">⏳ Ожидает подтверждения</div><div class="now-name">'+getClientName(next)+'</div><div class="now-detail"><span class="tag t-amber">'+getServiceName(next)+'</span> · '+fmtHM(next.time)+'</div></div><div class="now-actions"><button class="now-btn primary" onclick="confirmAppt('+next.id+')"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Подтвердить</button><button class="now-btn ghost" onclick="rescheduleAppt('+next.id+')"><svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>Перенести</button><button class="now-btn danger" onclick="cancelAppt('+next.id+')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>Отменить</button></div>';return;
  }
  el.className='now-card idle';el.innerHTML='<div class="now-left"><div class="now-label" style="color:var(--ink-muted)">✓ Всё выполнено</div><div class="now-name">Отличная работа!</div><div class="now-detail">Сегодня записей больше нет.</div></div>';
}

function renderTimeline(){
  document.getElementById('timeline').innerHTML=appts.map(a=>{
    const s=STATUS_MAP[a.status];const end=new Date(a.time.getTime()+a.duration*60000);
    let timerHtml='';if(a.status==='current'){const rem=Math.max(0,end-NOW);timerHtml='<div class="tl-timer" data-end="'+end.getTime()+'" id="tlTimer">'+fmtDur(rem)+'</div>';}
    let acts='';if(a.status==='pending')acts='<div class="tl-acts"><button class="tl-act" title="Подтвердить" onclick="event.stopPropagation();confirmAppt('+a.id+')"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></button><button class="tl-act danger" title="Отменить" onclick="event.stopPropagation();cancelAppt('+a.id+')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>';
    else if(a.status==='confirmed')acts='<div class="tl-acts"><button class="tl-act" title="Начать" onclick="event.stopPropagation();startAppt('+a.id+')"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></button><button class="tl-act" title="Перенести" onclick="event.stopPropagation();rescheduleAppt('+a.id+')"><svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg></button></div>';
    else if(a.status==='current')acts='<div class="tl-acts"><button class="tl-act" title="Завершить" onclick="event.stopPropagation();openComplete('+a.id+')"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></button><button class="tl-act" title="Продлить" onclick="event.stopPropagation();extendAppt('+a.id+')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></button></div>';
    return '<div class="tl-item st-'+a.status+'"><div class="tl-time">'+fmtHM(a.time)+'</div><div><div class="tl-client">'+getClientName(a)+'</div><div class="tl-detail"><span class="tag t-'+(getServiceName(a).includes('🌿')?'green':'purple')+'" style="padding:2px 7px;font-size:10px">'+getServiceName(a)+'</span> · '+fmtHM(a.time)+'–'+fmtHM(end)+'</div>'+acts+'</div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px"><span class="tl-status '+s.cls+'">'+s.label+'</span><span class="tl-time" style="font-size:11px">₽'+getServicePrice(a).toLocaleString()+'</span>'+timerHtml+'</div></div>';
  }).join('');
}

function tick(){const t=document.getElementById('timerValue');if(t){const cur=appts.find(a=>a.status==='current');if(cur){const end=new Date(cur.time.getTime()+cur.duration*60000);t.textContent=Math.max(0,end-NOW)>0?fmtDur(end-NOW):'0сек';}}const tl=document.getElementById('tlTimer');if(tl){const end=parseInt(tl.dataset.end);tl.textContent=fmtDur(Math.max(0,end-Date.now()));}renderStatus();}
function renderAll(){if(viewMode==='today'){renderStatus();renderStats();renderNowCard();renderTimeline();}renderJournal();}
renderAll();setInterval(tick,1000);

// Применение features к UI
document.addEventListener('DOMContentLoaded',()=>{
  // Calendar toggle
  if(!features.calendar){document.getElementById('btnCal').style.display='none';}
  // Journal
  if(!features.journal){const j=document.querySelector('.card.anim.d4');if(j)j.style.display='none';}
  // Stats
  if(!features.stats){document.querySelector('.stats').style.display='none';}
  // FAB
  if(!features.fab){document.querySelector('.fab').style.display='none';}
  // Search
  if(!features.search){const s=document.querySelector('.header-left .search');if(s)s.style.display='none';}
  // Notifications
  if(!features.notifications){const btn=document.querySelector('.hdr-btn[title="Уведомления"]');if(btn)btn.style.display='none';}
});
</script>
